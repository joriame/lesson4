<!-- Каркас страницы -->
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Тег для корректного отображения на мобильных устройствах -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Тег для заголовка страницы -->
    <title>
      Dostaffkin — Доставка посылок между странами и внутри стран. Безопасно.
      Быстро. В целости и сохранности!
    </title>
    <!-- Подключение файлов стилей -->
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/base_adaptive.css" />
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/index_adaptive.css" />
  </head>
  <body>
    <!-- Контейнер страницы -->
    <div class="container">
      <!-- Контейнер хедера -->
      <header class="header">
        <!-- Логотип -->
        <a class="header-brand" href="./index.html">
          <div class="header-logo">D</div>
          <div class="header-title">Dostaffkin</div>
        </a>
        <!-- Меню -->
        <nav class="header-menu">
          <a href="./order.html" class="header-link">Оформить <span>доставку</span></a>
          <a href="./track.html" class="header-link">Отследить <span>посылку</span></a>
        </nav>
      </header>
      <!-- Каркас основного блока -->
      <main class="main">
        <!-- Каркас контента -->
        <section class="main-info">
          <!-- Заголовок страницы -->
          <div class="main-title"><span>D</span>ostaffkin</div>
          <!-- Преимущества -->
          <div class="main-features">
            <div class="main-feature">Отслеживание 24/7</div>
            <div class="main-feature">Лучшие маршруты</div>
            <div class="main-feature">Страхование посылок</div>
            <div class="main-feature">Доставка в срок</div>
            <div class="main-feature">Выгодные тарифы</div>
          </div>
          <!-- Описание -->
          <div class="main-description">
            Доставка посылок между странами и внутри стран. Безопасно. Быстро. В
            целости и сохранности!
          </div>
          <!-- Блок с кнопками действий -->
          <div class="main-actions">
            <a class="button" type="button" href="./order.html"
              >Заказать доставку</a
            >
            <a class="button button-dark" type="button" href="./track.html"
              >Отследить посылку</a
            >
          </div>
        </section>
        <!-- Блок полупрозрачного текста -->
        <div class="main-title-ghost">Dostaffkin</div>
        <!-- Блок с изображением -->
        <section class="main-image">
          <img src="images/main-image.png" alt="Main image" />
        </section>
      </main>
    </div>
  </body>
</html>
